<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>動物探險大富翁｜一年級108課綱練習遊戲</title>
  <style>
    :root {
      --bg: #fff8df;
      --ink: #3c2d1f;
      --card: #fffdf7;
      --primary: #ffb74d;
      --primary-dark: #e6821e;
      --green: #a5d66d;
      --blue: #88d8ff;
      --pink: #ffb6c8;
      --purple: #c9b6ff;
      --shadow: 0 10px 28px rgba(60,45,31,.16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background: linear-gradient(180deg, #bfefff 0%, var(--bg) 48%, #e7ffd6 100%);
      color: var(--ink);
      min-height: 100vh;
    }
    button, input, select { font: inherit; }
    .app { max-width: 1180px; margin: 0 auto; padding: 18px; }
    header { text-align: center; padding: 10px 8px 14px; }
    h1 { margin: 0; font-size: clamp(28px, 5vw, 52px); letter-spacing: .03em; }
    .subtitle { margin: 8px auto 0; max-width: 760px; font-weight: 700; color: #624a32; }
    .panel {
      background: rgba(255,255,255,.9);
      border: 4px solid rgba(255,255,255,.85);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .setup-grid { display: grid; grid-template-columns: 1fr; gap: 14px; max-width: 860px; margin: 0 auto; }
    .setup-row { display: grid; grid-template-columns: 130px 1fr 190px; gap: 10px; align-items: center; background:#fff7df; border-radius:20px; padding:12px; }
    .setup-row label { font-weight: 900; }
    input, select { width: 100%; border: 3px solid #f0cf83; border-radius: 16px; padding: 11px 12px; background:#fff; outline: none; }
    input:focus, select:focus { border-color: #ff9800; }
    .actions { display:flex; gap: 10px; flex-wrap: wrap; justify-content:center; margin-top: 16px; }
    .btn {
      border: 0;
      border-radius: 18px;
      padding: 12px 18px;
      background: var(--primary);
      color: #3b2209;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 0 var(--primary-dark);
      transition: transform .08s ease, box-shadow .08s ease, opacity .2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--primary-dark); }
    .btn.secondary { background:#dff5ff; box-shadow:0 5px 0 #6bb6db; }
    .btn.good { background:#b7e37d; box-shadow:0 5px 0 #6aa52d; }
    .btn.danger { background:#ffb0b0; box-shadow:0 5px 0 #d66060; }
    .btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }
    .game-layout { display: grid; grid-template-columns: minmax(0, 1fr) 330px; gap: 16px; align-items:start; }
    .map-wrap { position: relative; overflow: hidden; min-height: 620px; }
    .board {
      position: relative;
      width: min(100%, 920px);
      aspect-ratio: 1.72/1;
      min-height: 535px;
      margin: 10px auto;
      border-radius: 34px;
      background:
        radial-gradient(circle at 12% 15%, rgba(255,255,255,.88) 0 5%, transparent 6%),
        radial-gradient(circle at 82% 18%, rgba(255,255,255,.78) 0 6%, transparent 7%),
        radial-gradient(circle at 24% 82%, rgba(255,255,255,.72) 0 4%, transparent 5%),
        linear-gradient(180deg, #bdefff 0 46%, #eaffc7 47% 100%);
      border: 8px solid rgba(255,255,255,.9);
      box-shadow: inset 0 0 0 8px rgba(255,213,106,.55), var(--shadow);
      overflow: hidden;
    }
    .board::before {
      content: "🌈  蛇行探險路線  🐾";
      position:absolute;
      left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: min(74%, 570px);
      text-align:center;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      border: 4px dashed rgba(255,169,77,.78);
      font-size: clamp(18px, 3vw, 34px);
      font-weight: 1000;
      color: #6a4a22;
      opacity: .88;
      z-index: 1;
      pointer-events: none;
    }
    .center-card {
      position:absolute; left:50%; top:66%; transform:translate(-50%,-50%);
      background: rgba(255,255,255,.72);
      border: 3px dashed #ffa94d;
      border-radius: 22px;
      padding: 10px 14px;
      width: min(58%, 430px);
      text-align:center;
      box-shadow: 0 5px 16px rgba(60,45,31,.12);
      z-index: 1;
      pointer-events:none;
    }
    .center-card h2 { margin:0 0 4px; font-size: clamp(18px, 2.4vw, 28px); }
    .center-card p { margin:3px 0; font-weight:800; }
    .cell {
      position:absolute;
      width: clamp(48px, 7.4vw, 82px);
      height: clamp(48px, 7.4vw, 82px);
      transform: translate(-50%, -50%);
      border-radius: 18px;
      border: 4px solid rgba(255,255,255,.97);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      box-shadow: 0 5px 12px rgba(0,0,0,.16);
      font-weight: 900;
      font-size: clamp(12px, 1.7vw, 18px);
      background:#fff7cc;
      z-index: 2;
    }
    .cell small { font-size: .68em; opacity:.76; line-height:1; }
    .cell.start { background:#ddffd0; }
    .cell.finish { background:#ffe0ef; animation: glow 1.6s infinite alternate; }
    .cell.subj-國語文 { background:#ffd8e4; }
    .cell.subj-數學 { background:#cfeeff; }
    .cell.subj-生活課程 { background:#d9ffc9; }
    .cell.subj-健康與體育 { background:#eee0ff; }
    @keyframes glow { from { box-shadow: 0 4px 10px rgba(0,0,0,.15); } to { box-shadow: 0 0 20px rgba(255,105,180,.8); } }
    .tokens { position:absolute; inset:0; pointer-events:none; }
    .token {
      position:absolute;
      width: 34px; height: 34px;
      display:grid; place-items:center;
      background:#fff;
      border:3px solid #ff9f1a;
      border-radius:50%;
      font-size:22px;
      transform: translate(-50%, -50%);
      box-shadow: 0 5px 9px rgba(0,0,0,.18);
      z-index: 6;
      transition: left .28s ease, top .28s ease;
    }
    .token.finished { border-color:#ff4fa0; animation: bounce .8s infinite alternate; }
    @keyframes bounce { to { transform: translate(-50%, -58%); } }
    .side { display:flex; flex-direction:column; gap: 12px; }
    .current { text-align:center; }
    .current-player { font-size: 28px; font-weight: 1000; margin: 8px 0; }
    .dice {
      width: 110px; height: 110px; margin: 12px auto;
      border-radius: 26px;
      background: #fff;
      border: 5px solid #ffe1a3;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,.08), 0 8px 16px rgba(0,0,0,.14);
      display:grid; place-items:center;
      font-size: 58px;
      font-weight: 1000;
    }
    .status { background:#fff7df; border-radius:20px; padding:12px; font-weight:800; min-height: 70px; }
    .score-list { display:flex; flex-direction:column; gap:8px; }
    .score-card {
      display:grid; grid-template-columns: 44px 1fr auto; gap:8px; align-items:center;
      padding:10px; border-radius:18px; background:#fff7df;
      border: 2px solid rgba(255,190,90,.45);
      font-weight:800;
    }
    .score-card .avatar { font-size:28px; }
    .progressbar { height: 10px; background:#eee; border-radius:99px; overflow:hidden; margin-top:6px; }
    .progressbar > span { display:block; height:100%; background:linear-gradient(90deg,#ffbe58,#7bdc70); border-radius:99px; }
    .rules { line-height:1.65; font-weight:700; }
    .hidden { display:none !important; }
    .modal-backdrop {
      position: fixed; inset:0; background: rgba(50,35,20,.48);
      display:flex; justify-content:center; align-items:center;
      padding: 16px; z-index: 20;
    }
    .modal {
      width: min(94vw, 720px);
      background: var(--card);
      border-radius: 30px;
      border: 6px solid #ffe0a3;
      box-shadow: 0 18px 50px rgba(0,0,0,.28);
      padding: 20px;
      text-align:center;
    }
    .modal h2 { margin: 4px 0 10px; font-size: clamp(24px, 4vw, 40px); }
    .question-subject { display:inline-block; padding:6px 14px; background:#e8f7ff; border-radius:99px; font-weight:900; margin-bottom:10px; }
    .question-text { font-size: clamp(24px, 4vw, 36px); font-weight:1000; margin:14px 0; line-height:1.35; }
    .options { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin: 14px 0; }
    .option-btn {
      border: 4px solid #ffe0a3;
      border-radius: 20px;
      background:#fff;
      padding: 14px;
      font-weight: 1000;
      font-size: 22px;
      cursor:pointer;
    }
    .option-btn:hover { background:#fff4d8; }
    .answer-input { max-width: 420px; margin: 8px auto 14px; font-size: 24px; text-align:center; }
    .feedback {
      margin-top: 12px;
      padding: 13px;
      border-radius: 18px;
      background: #eefbe6;
      font-weight: 900;
      line-height:1.55;
    }
    .feedback.bad { background:#ffe9e9; }
    .confetti { font-size: 34px; letter-spacing: .12em; }
    .tagline { font-size: 13px; opacity:.75; margin-top:8px; }
    .footer-note { text-align:center; margin-top:16px; font-size: 13px; opacity:.7; font-weight:700; }
    @media (max-width: 980px) {
      .game-layout { grid-template-columns: 1fr; }
      .side { grid-row: 1; }
      .map-wrap { grid-row: 2; min-height: 520px; }
      .board { min-height: 480px; }
    }
    @media (max-width: 640px) {
      .setup-row { grid-template-columns: 1fr; }
      .options { grid-template-columns: 1fr; }
      .app { padding: 10px; }
      .panel { padding: 13px; border-radius:22px; }
      .board { min-height: 430px; }
      .center-card { width: 70%; padding: 8px; top: 66%; }
      .center-card p { font-size: 12px; }
      .cell { width: clamp(38px, 9.2vw, 54px); height: clamp(38px, 9.2vw, 54px); border-radius: 13px; }
      .token { width: 29px; height:29px; font-size:18px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🐾 動物探險大富翁</h1>
      <p class="subtitle">2～4人｜45格｜一顆骰子｜所有人都到終點才完成｜一年級108課綱方向題庫</p>
    </header>

    <section id="setupScreen" class="panel setup-grid">
      <h2>① 選擇玩家與角色</h2>
      <div>
        <label for="playerCount"><strong>玩家人數：</strong></label>
        <select id="playerCount">
          <option value="2">2 人</option>
          <option value="3">3 人</option>
          <option value="4">4 人</option>
        </select>
      </div>
      <div id="playerSetup"></div>
      <div class="rules">
        <strong>玩法：</strong>輪流擲一顆骰子前進。走到格子後回答題目；答對得 1 顆星，答錯會顯示白話提示，不扣分。先到終點的人等待其他人；所有玩家都到終點，遊戲才完成。
      </div>
      <div class="actions">
        <button id="startBtn" class="btn good">開始遊戲</button>
        <button id="soundBtnSetup" class="btn secondary" type="button">音效：開</button>
        <button id="musicBtnSetup" class="btn secondary" type="button">背景音樂：開</button>
      </div>
    </section>

    <section id="gameScreen" class="game-layout hidden">
      <main class="panel map-wrap">
        <div class="board" id="board">
          <div class="center-card">
            <h2>到終點拿星星！</h2>
            <p>國語🌸 數學💧 生活🌿 健體🦄</p>
            <p>答錯沒關係，讀提示再學一次。可開啟輕快背景音樂。</p>
          </div>
          <div class="tokens" id="tokensLayer"></div>
        </div>
        <p class="footer-note">地圖格數：45格｜蛇行方塊路線｜出發=第1格｜終點=第45格</p>
      </main>

      <aside class="side">
        <section class="panel current">
          <div>現在輪到</div>
          <div id="currentPlayer" class="current-player">—</div>
          <div id="dice" class="dice">🎲</div>
          <button id="rollBtn" class="btn good">擲骰子</button>
          <div id="status" class="status">準備開始！</div>
          <div class="actions">
            <button id="readBtn" class="btn secondary" type="button">🔊 唸狀態</button>
            <button id="soundBtn" class="btn secondary" type="button">音效：開</button>
            <button id="musicBtn" class="btn secondary" type="button">背景音樂：開</button>
            <button id="resetBtn" class="btn danger" type="button">重新開始</button>
          </div>
        </section>
        <section class="panel">
          <h2>玩家進度</h2>
          <div id="scoreList" class="score-list"></div>
        </section>
      </aside>
    </section>
  </div>

  <div id="questionModal" class="modal-backdrop hidden">
    <div class="modal">
      <div id="questionSubject" class="question-subject">科目</div>
      <h2 id="questionTitle">題目</h2>
      <div id="questionText" class="question-text"></div>
      <div id="options" class="options"></div>
      <input id="answerInput" class="answer-input hidden" placeholder="請輸入答案" />
      <div class="actions">
        <button id="submitInputBtn" class="btn good hidden">送出答案</button>
        <button id="speakQuestionBtn" class="btn secondary">🔊 唸題目</button>
      </div>
      <div id="feedback" class="feedback hidden"></div>
      <div class="actions">
        <button id="nextTurnBtn" class="btn good hidden">下一位玩家</button>
      </div>
    </div>
  </div>

  <div id="endModal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="confetti">🎉 ⭐ 🐾 ⭐ 🎉</div>
      <h2>恭喜！大家都抵達終點！</h2>
      <div id="finalResult"></div>
      <div class="actions">
        <button id="playAgainBtn" class="btn good">再玩一次</button>
      </div>
      <p class="tagline">完成條件：所有玩家都到第45格。</p>
    </div>
  </div>

<script>
const QUESTION_BANK = {
  "國語文": [
    {
      "type": "choice",
      "q": "哪一個是禮貌用語？",
      "options": [
        "謝謝",
        "不理人",
        "搶玩具",
        "大叫"
      ],
      "answer": "謝謝",
      "explain": "接受幫忙或收到東西時，可以說「謝謝」。"
    },
    {
      "type": "choice",
      "q": "「大」的相反詞是什麼？",
      "options": [
        "小",
        "多",
        "快",
        "高"
      ],
      "answer": "小",
      "explain": "大和小是一組相反詞。"
    },
    {
      "type": "choice",
      "q": "哪一個符號是句號？",
      "options": [
        "。",
        "？",
        "！",
        "，"
      ],
      "answer": "。",
      "explain": "一句話說完，常用句號「。」。"
    },
    {
      "type": "tf",
      "q": "「早安」通常是在早上打招呼時說的。",
      "answer": true,
      "explain": "早上見面可以說「早安」。"
    },
    {
      "type": "input",
      "q": "「ㄇㄚ ㄇㄚ」可以寫成哪個詞？",
      "answer": [
        "媽媽",
        "妈 妈",
        "媽 媽"
      ],
      "explain": "ㄇㄚ ㄇㄚ就是「媽媽」。"
    },
    {
      "type": "choice",
      "q": "讀一讀：小狗跑得快。小狗在做什麼？",
      "options": [
        "跑",
        "睡",
        "畫畫",
        "吃飯"
      ],
      "answer": "跑",
      "explain": "句子中說小狗「跑」得快。"
    },
    {
      "type": "choice",
      "q": "「我有一本書。」這句話中的量詞是哪一個？",
      "options": [
        "本",
        "我",
        "書",
        "有"
      ],
      "answer": "本",
      "explain": "一本書的「本」是量詞。"
    },
    {
      "type": "choice",
      "q": "哪一個字跟「水」有關？",
      "options": [
        "河",
        "火",
        "山",
        "日"
      ],
      "answer": "河",
      "explain": "河裡有水，所以「河」和水有關。"
    },
    {
      "type": "tf",
      "q": "別人說話時，我們可以一直插嘴。",
      "answer": false,
      "explain": "要等別人說完，再輪到自己說。"
    },
    {
      "type": "choice",
      "q": "「天上有太陽。」這句話主要在說什麼？",
      "options": [
        "太陽",
        "鞋子",
        "鉛筆",
        "杯子"
      ],
      "answer": "太陽",
      "explain": "句子裡說天上有太陽。"
    },
    {
      "type": "input",
      "q": "請輸入「一、二、三」後面的數字國字。",
      "answer": [
        "四"
      ],
      "explain": "一、二、三、四。"
    },
    {
      "type": "choice",
      "q": "下面哪一句比較有禮貌？",
      "options": [
        "請借我一下。",
        "快給我！",
        "走開！",
        "我不要聽。"
      ],
      "answer": "請借我一下。",
      "explain": "加上「請」會比較有禮貌。"
    },
    {
      "type": "choice",
      "q": "「口」像哪一種形狀？",
      "options": [
        "方形",
        "圓形",
        "三角形",
        "星形"
      ],
      "answer": "方形",
      "explain": "「口」看起來像方方的形狀。"
    },
    {
      "type": "tf",
      "q": "閱讀故事時，可以先看圖片猜一猜內容。",
      "answer": true,
      "explain": "看圖預測是很好的閱讀方法。"
    },
    {
      "type": "choice",
      "q": "哪一個詞語表示聲音很小？",
      "options": [
        "小聲",
        "大聲",
        "用力",
        "很高"
      ],
      "answer": "小聲",
      "explain": "小聲就是聲音比較小。"
    },
    {
      "type": "choice",
      "q": "「花開了！」這句話適合用哪個標點？",
      "options": [
        "！",
        "。",
        "，",
        "？"
      ],
      "answer": "！",
      "explain": "很開心或驚喜時，可以用驚嘆號。"
    },
    {
      "type": "input",
      "q": "「小貓喵喵叫。」誰在叫？",
      "answer": [
        "小貓",
        "貓",
        "猫"
      ],
      "explain": "句子說小貓喵喵叫。"
    },
    {
      "type": "choice",
      "q": "哪一個詞語是一種動作？",
      "options": [
        "跳",
        "天空",
        "紅色",
        "書包"
      ],
      "answer": "跳",
      "explain": "跳是一個動作。"
    },
    {
      "type": "tf",
      "q": "寫字時，字可以全部擠在一起，別人看不懂也沒關係。",
      "answer": false,
      "explain": "字要寫清楚，別人才看得懂。"
    },
    {
      "type": "choice",
      "q": "「爸爸在看書。」這句話中，爸爸在看什麼？",
      "options": [
        "書",
        "球",
        "雨傘",
        "蘋果"
      ],
      "answer": "書",
      "explain": "句子說爸爸在看書。"
    }
  ],
  "數學": [
    {
      "type": "choice",
      "q": "3 + 2 = ?",
      "options": [
        "5",
        "4",
        "6",
        "2"
      ],
      "answer": "5",
      "explain": "3個再加2個，一共有5個。"
    },
    {
      "type": "choice",
      "q": "10 - 4 = ?",
      "options": [
        "6",
        "5",
        "7",
        "4"
      ],
      "answer": "6",
      "explain": "10拿走4，還剩6。"
    },
    {
      "type": "choice",
      "q": "哪一個數字最大？",
      "options": [
        "8",
        "3",
        "6",
        "1"
      ],
      "answer": "8",
      "explain": "8比3、6、1都大。"
    },
    {
      "type": "tf",
      "q": "5 比 9 大。",
      "answer": false,
      "explain": "9比較大，5比較小。"
    },
    {
      "type": "input",
      "q": "請輸入 7 後面的下一個數字。",
      "answer": [
        "8",
        "８"
      ],
      "explain": "7後面是8。"
    },
    {
      "type": "choice",
      "q": "哪一個形狀有三個角？",
      "options": [
        "三角形",
        "圓形",
        "長方形",
        "正方形"

const ANIMALS = [
  {name:'小兔子', icon:'🐰'},
  {name:'小熊', icon:'🐻'},
  {name:'小貓', icon:'🐱'},
  {name:'小狗', icon:'🐶'},
  {name:'小狐狸', icon:'🦊'},
  {name:'小企鵝', icon:'🐧'}
];
const SUBJECTS = Object.keys(QUESTION_BANK);
const CELL_COUNT = 45;
const FINISH_INDEX = CELL_COUNT - 1;
const diceFaces = ['⚀','⚁','⚂','⚃','⚄','⚅'];

let state = {
  players: [],
  current: 0,
  cells: [],
  positions: [],
  awaitingQuestion: false,
  currentQuestion: null,
  soundOn: true,
  musicOn: true,
  used: {},
  finishOrder: []
};
let audioCtx = null;
let bgmTimer = null;
let bgmMasterGain = null;

const $ = (id) => document.getElementById(id);

function initSetup() {
  renderPlayerSetup();
  $('playerCount').addEventListener('change', renderPlayerSetup);
  $('startBtn').addEventListener('click', startGame);
  $('rollBtn').addEventListener('click', rollDice);
  $('resetBtn').addEventListener('click', () => location.reload());
  $('soundBtn').addEventListener('click', toggleSound);
  $('soundBtnSetup').addEventListener('click', toggleSound);
  $('musicBtn').addEventListener('click', toggleMusic);
  $('musicBtnSetup').addEventListener('click', toggleMusic);
  $('readBtn').addEventListener('click', () => speak($('status').textContent));
  $('speakQuestionBtn').addEventListener('click', speakCurrentQuestion);
  $('submitInputBtn').addEventListener('click', submitInputAnswer);
  $('answerInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitInputAnswer(); });
  $('nextTurnBtn').addEventListener('click', () => { hideQuestion(); nextTurn(); });
  $('playAgainBtn').addEventListener('click', () => location.reload());
  updateMusicButtons();
}

function renderPlayerSetup() {
  const count = Number($('playerCount').value);
  const box = $('playerSetup');
  box.innerHTML = '';
  for (let i=0; i<count; i++) {
    const row = document.createElement('div');
    row.className = 'setup-row';
    row.innerHTML = `
      <label>玩家 ${i+1}</label>
      <input id="pname-${i}" value="玩家${i+1}" maxlength="8" aria-label="玩家${i+1}名稱" />
      <select id="pavatar-${i}" aria-label="玩家${i+1}角色">
        ${ANIMALS.map((a, idx) => `<option value="${idx}" ${idx===i?'selected':''}>${a.icon} ${a.name}</option>`).join('')}
      </select>`;
    box.appendChild(row);
  }
}

function startGame() {
  unlockAudio();
  updateMusicButtons();
  const count = Number($('playerCount').value);
  state.players = [];
  const picked = new Set();
  for (let i=0; i<count; i++) {
    const name = ($(`pname-${i}`).value || `玩家${i+1}`).trim().slice(0,8);
    const animalIndex = Number($(`pavatar-${i}`).value);
    const animal = ANIMALS[animalIndex];
    if (picked.has(animalIndex)) {
      alert('每位玩家請選不同的動物角色，這樣地圖上比較清楚喔！');
      return;
    }
    picked.add(animalIndex);
    state.players.push({
      name,
      animal,
      pos: 0,
      score: 0,
      finished: false,
      finishedAt: null
    });
  }
  state.current = 0;
  state.used = Object.fromEntries(SUBJECTS.map(s => [s, []]));
  buildCells();
  $('setupScreen').classList.add('hidden');
  $('gameScreen').classList.remove('hidden');
  renderAll();
  setStatus('遊戲開始！請擲骰子。');
  playTone('start');
  if (state.musicOn) startBackgroundMusic();
}

function buildCells() {
  const board = $('board');
  board.querySelectorAll('.cell').forEach(el => el.remove());
  state.cells = [];
  for (let i=0; i<CELL_COUNT; i++) {
    let subject = SUBJECTS[(i-1 + SUBJECTS.length) % SUBJECTS.length];
    if (i === 0) subject = '出發';
    if (i === FINISH_INDEX) subject = '終點';
    state.cells.push({ index: i, subject });
    const cell = document.createElement('div');
    cell.className = `cell ${i===0?'start':''} ${i===FINISH_INDEX?'finish':''} ${subject !== '出發' && subject !== '終點' ? 'subj-' + subject : ''}`;
    cell.id = `cell-${i}`;
    cell.setAttribute('aria-label', `第${i+1}格 ${subject}`);
    const icon = i===0 ? '🚩' : (i===FINISH_INDEX ? '🏆' : subjectIcon(subject));
    const label = i===0 ? '出發' : (i===FINISH_INDEX ? '終點' : shortSubject(subject));
    const arrow = i===FINISH_INDEX ? '' : `<small>${snakeArrow(i)}</small>`;
    cell.innerHTML = `<div>${icon}</div><small>${i+1} ${label}</small>${arrow}`;
    board.appendChild(cell);
  }
  positionCells();
  window.addEventListener('resize', () => { positionCells(); renderTokens(); });
}

function subjectIcon(subject) {
  return {'國語文':'🌸','數學':'💧','生活課程':'🌿','健康與體育':'🦄'}[subject] || '⭐';
}
function shortSubject(subject) { return {'國語文':'國','數學':'數','生活課程':'生','健康與體育':'健'}[subject] || subject; }
function snakeArrow(i) {
  if (i >= FINISH_INDEX) return '';
  const cols = 9;
  const row = Math.floor(i / cols);
  const nextRow = Math.floor((i + 1) / cols);
  if (nextRow !== row) return '⬆';
  return row % 2 === 0 ? '➡' : '⬅';
}

function positionCells() {
  const cols = 9;
  const rows = 5;
  const left = 8;
  const right = 92;
  const top = 10;
  const bottom = 90;
  state.positions = [];
  for (let i=0; i<CELL_COUNT; i++) {
    const logicalRow = Math.floor(i / cols);
    const logicalCol = i % cols;
    const displayCol = logicalRow % 2 === 0 ? logicalCol : cols - 1 - logicalCol;
    const displayRow = rows - 1 - logicalRow;
    const x = left + displayCol * ((right - left) / (cols - 1));
    const y = top + displayRow * ((bottom - top) / (rows - 1));
    state.positions.push({x, y});
    const cell = $(`cell-${i}`);
    if (cell) { cell.style.left = x + '%'; cell.style.top = y + '%'; }
  }
}

function renderAll() { renderCurrent(); renderScores(); renderTokens(); }

function renderCurrent() {
  const p = state.players[state.current];
  $('currentPlayer').textContent = p ? `${p.animal.icon} ${p.name}` : '—';
  $('rollBtn').disabled = !p || p.finished || state.awaitingQuestion || allFinished();
}

function renderScores() {
  const list = $('scoreList');
  list.innerHTML = '';
  state.players.forEach((p, idx) => {
    const percent = Math.round((p.pos / FINISH_INDEX) * 100);
    const card = document.createElement('div');
    card.className = 'score-card';
    card.innerHTML = `
      <div class="avatar">${p.animal.icon}</div>
      <div>
        <div>${idx === state.current ? '👉 ' : ''}${p.name} ${p.finished ? '🏆' : ''}</div>
        <div class="progressbar"><span style="width:${percent}%"></span></div>
      </div>
      <div>⭐ ${p.score}<br><small>${p.pos+1}/45</small></div>`;
    list.appendChild(card);
  });
}

function renderTokens() {
  const layer = $('tokensLayer');
  layer.innerHTML = '';
  const offsets = [[-13,-13],[13,-13],[-13,13],[13,13]];
  state.players.forEach((p, idx) => {
    const base = state.positions[p.pos] || state.positions[0] || {x:50,y:50};
    const board = $('board').getBoundingClientRect();
    const off = offsets[idx] || [0,0];
    const el = document.createElement('div');
    el.className = 'token' + (p.finished ? ' finished' : '');
    el.title = p.name;
    el.textContent = p.animal.icon;
    el.style.left = `calc(${base.x}% + ${off[0]}px)`;
    el.style.top = `calc(${base.y}% + ${off[1]}px)`;
    layer.appendChild(el);
  });
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

async function rollDice() {
  const p = state.players[state.current];
  if (!p || p.finished || state.awaitingQuestion) return;
  unlockAudio();
  $('rollBtn').disabled = true;
  setStatus(`${p.animal.icon} ${p.name} 正在擲骰子……`);
  for (let i=0; i<10; i++) {
    const n = Math.floor(Math.random()*6);
    $('dice').textContent = diceFaces[n];
    playTone('tick');
    await sleep(65);
  }
  const steps = Math.floor(Math.random()*6) + 1;
  $('dice').textContent = diceFaces[steps-1];
  setStatus(`${p.animal.icon} ${p.name} 擲到 ${steps}，前進 ${steps} 格！`);
  await sleep(300);
  for (let s=0; s<steps; s++) {
    if (p.pos < FINISH_INDEX) {
      p.pos += 1;
      playTone('move');
      renderAll();
      await sleep(260);
    }
  }
  if (p.pos >= FINISH_INDEX) {
    p.pos = FINISH_INDEX;
    if (!p.finished) {
      p.finished = true;
      p.finishedAt = Date.now();
      state.finishOrder.push(p.name);
      p.score += 2;
    }
    renderAll();
    playTone('win');
    setStatus(`${p.animal.icon} ${p.name} 抵達終點！獲得 2 顆星，等待其他玩家完成。`);
    await sleep(900);
    if (allFinished()) endGame(); else nextTurn();
  } else {
    askQuestionForCurrentCell();
  }
}

function askQuestionForCurrentCell() {
  const p = state.players[state.current];
  const subject = state.cells[p.pos].subject;
  const q = pickQuestion(subject);
  state.currentQuestion = {...q, subject};
  state.awaitingQuestion = true;
  $('questionModal').classList.remove('hidden');
  $('questionSubject').textContent = `${subjectIcon(subject)} ${subject}`;
  $('questionTitle').textContent = `${p.animal.icon} ${p.name} 的題目`;
  $('questionText').textContent = q.q;
  $('feedback').classList.add('hidden');
  $('nextTurnBtn').classList.add('hidden');
  $('options').innerHTML = '';
  $('answerInput').classList.add('hidden');
  $('submitInputBtn').classList.add('hidden');
  if (q.type === 'choice') {
    $('options').classList.remove('hidden');
    shuffle([...q.options]).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => checkAnswer(opt);
      $('options').appendChild(btn);
    });
  } else if (q.type === 'tf') {
    $('options').classList.remove('hidden');
    [{label:'⭕ 對', value:true}, {label:'❌ 錯', value:false}].forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt.label;
      btn.onclick = () => checkAnswer(opt.value);
      $('options').appendChild(btn);
    });
  } else {
    $('options').classList.add('hidden');
    $('answerInput').value = '';
    $('answerInput').classList.remove('hidden');
    $('submitInputBtn').classList.remove('hidden');
    setTimeout(() => $('answerInput').focus(), 100);
  }
  setStatus(`${p.animal.icon} ${p.name} 走到第 ${p.pos+1} 格，要回答「${subject}」題目。`);
}

function pickQuestion(subject) {
  const bank = QUESTION_BANK[subject];
  const used = state.used[subject] || [];
  if (used.length >= bank.length) state.used[subject] = [];
  let idx;
  do { idx = Math.floor(Math.random() * bank.length); } while ((state.used[subject] || []).includes(idx));
  state.used[subject].push(idx);
  return bank[idx];
}

function submitInputAnswer() {
  const value = $('answerInput').value.trim();
  if (!value) { alert('請先輸入答案喔！'); return; }
  checkAnswer(value);
}

function normalize(x) { return String(x).trim().replace(/\s+/g,'').toLowerCase(); }

function checkAnswer(value) {
  const q = state.currentQuestion;
  const p = state.players[state.current];
  let correct = false;
  if (Array.isArray(q.answer)) {
    correct = q.answer.map(normalize).includes(normalize(value));
  } else {
    correct = normalize(q.answer) === normalize(value);
  }
  document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
  $('submitInputBtn').disabled = true;
  const answerText = Array.isArray(q.answer) ? q.answer[0] : (q.answer === true ? '對' : q.answer === false ? '錯' : q.answer);
  const fb = $('feedback');
  fb.classList.remove('hidden', 'bad');
  if (correct) {
    p.score += 1;
    fb.innerHTML = `🎉 答對了！獲得 1 顆星。<br><span>${q.explain}</span>`;
    playTone('correct');
    setStatus(`${p.animal.icon} ${p.name} 答對了，獲得 1 顆星！`);
  } else {
    fb.classList.add('bad');
    fb.innerHTML = `🌱 沒關係，再學一次！正確答案：<strong>${answerText}</strong><br><span>${q.explain}</span>`;
    playTone('wrong');
    setStatus(`${p.animal.icon} ${p.name} 這題答錯了，讀提示再出發。`);
  }
  $('nextTurnBtn').classList.remove('hidden');
  $('submitInputBtn').disabled = false;
  renderScores();
}

function hideQuestion() {
  $('questionModal').classList.add('hidden');
  state.awaitingQuestion = false;
  state.currentQuestion = null;
}

function nextTurn() {
  if (allFinished()) return endGame();
  let next = state.current;
  for (let i=0; i<state.players.length; i++) {
    next = (next + 1) % state.players.length;
    if (!state.players[next].finished) break;
  }
  state.current = next;
  const p = state.players[state.current];
  setStatus(`輪到 ${p.animal.icon} ${p.name}，請擲骰子。`);
  renderAll();
}

function allFinished() { return state.players.length > 0 && state.players.every(p => p.finished); }

function endGame() {
  playTone('finish');
  $('rollBtn').disabled = true;
  const ranking = [...state.players]
    .sort((a,b) => b.score - a.score)
    .map((p,i) => `<p><strong>${i+1}. ${p.animal.icon} ${p.name}</strong>：${p.score} 顆星，位置 ${p.pos+1}/45</p>`)
    .join('');
  $('finalResult').innerHTML = `<h3>星星排行榜</h3>${ranking}<p><strong>抵達順序：</strong>${state.finishOrder.join(' → ')}</p>`;
  $('endModal').classList.remove('hidden');
  setStatus('遊戲完成！所有玩家都抵達終點。');
}

function setStatus(msg) { $('status').textContent = msg; }

function shuffle(arr) {
  for (let i=arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function unlockAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function toggleSound() {
  state.soundOn = !state.soundOn;
  $('soundBtn').textContent = '音效：' + (state.soundOn ? '開' : '關');
  $('soundBtnSetup').textContent = '音效：' + (state.soundOn ? '開' : '關');
  if (state.soundOn) { unlockAudio(); playTone('tick'); }
}
function playTone(kind) {
  if (!state.soundOn) return;
  try {
    unlockAudio();
    const now = audioCtx.currentTime;
    const patterns = {
      tick: [[440,.045]], move: [[660,.055]], start: [[523,.08],[659,.08],[784,.11]],
      correct: [[700,.09],[880,.12],[1047,.16]], wrong: [[220,.16],[170,.14]],
      win: [[523,.1],[659,.1],[784,.1],[1047,.2]], finish: [[523,.12],[659,.12],[784,.12],[1047,.12],[1318,.22]]
    };
    let t = now;
    (patterns[kind] || patterns.tick).forEach(([freq, dur]) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = kind === 'wrong' ? 'sawtooth' : 'sine';
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.16, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + dur + .03);
      t += dur + .045;
    });
  } catch(e) { /* Some browsers block audio until user action. */ }
}


function updateMusicButtons() {
  const label = '背景音樂：' + (state.musicOn ? '開' : '關');
  ['musicBtn', 'musicBtnSetup'].forEach(id => { if ($(id)) $(id).textContent = label; });
}
function toggleMusic() {
  state.musicOn = !state.musicOn;
  updateMusicButtons();
  if (state.musicOn) {
    unlockAudio();
    startBackgroundMusic();
  } else {
    stopBackgroundMusic();
  }
}
function ensureBgmGain() {
  unlockAudio();
  if (!bgmMasterGain) {
    bgmMasterGain = audioCtx.createGain();
    bgmMasterGain.gain.value = 0.055;
    bgmMasterGain.connect(audioCtx.destination);
  }
}
function startBackgroundMusic() {
  if (!state.musicOn) return;
  try {
    ensureBgmGain();
    const now = audioCtx.currentTime;
    bgmMasterGain.gain.cancelScheduledValues(now);
    bgmMasterGain.gain.setValueAtTime(Math.max(bgmMasterGain.gain.value, 0.001), now);
    bgmMasterGain.gain.linearRampToValueAtTime(0.055, now + 0.35);
    if (!bgmTimer) scheduleBgmLoop();
  } catch(e) { /* Browser may block audio until a user clicks. */ }
}
function stopBackgroundMusic() {
  if (bgmTimer) {
    clearTimeout(bgmTimer);
    bgmTimer = null;
  }
  if (bgmMasterGain && audioCtx) {
    const now = audioCtx.currentTime;
    bgmMasterGain.gain.cancelScheduledValues(now);
    bgmMasterGain.gain.setValueAtTime(bgmMasterGain.gain.value, now);
    bgmMasterGain.gain.linearRampToValueAtTime(0.0001, now + 0.35);
  }
}
function scheduleBgmLoop() {
  if (!state.musicOn || !audioCtx || !bgmMasterGain) { bgmTimer = null; return; }
  const melody = [
    [523.25,.24], [659.25,.24], [783.99,.34], [0,.10],
    [659.25,.24], [783.99,.24], [1046.50,.42], [0,.18],
    [987.77,.22], [783.99,.22], [659.25,.30], [587.33,.22], [659.25,.48], [0,.22],
    [523.25,.24], [587.33,.24], [659.25,.34], [0,.10],
    [659.25,.22], [783.99,.22], [880.00,.30], [783.99,.22], [659.25,.46], [0,.30]
  ];
  const bass = [
    [261.63,.48], [0,.12], [329.63,.48], [0,.12], [392.00,.48], [0,.12], [329.63,.48], [0,.12],
    [261.63,.48], [0,.12], [349.23,.48], [0,.12], [392.00,.48], [0,.12], [329.63,.48], [0,.12]
  ];
  const start = audioCtx.currentTime + 0.06;
  let t = start;
  melody.forEach(([freq, dur]) => {
    if (freq) playBgmNote(freq, t, dur, 'triangle', 0.62);
    t += dur;
  });
  let bt = start;
  bass.forEach(([freq, dur]) => {
    if (freq) playBgmNote(freq, bt, dur, 'sine', 0.35);
    bt += dur;
  });
  const loopMs = Math.max(t, bt) - start;
  bgmTimer = setTimeout(() => { bgmTimer = null; scheduleBgmLoop(); }, Math.max(1000, loopMs * 1000 - 120));
}
function playBgmNote(freq, start, dur, type, level) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(0.11 * level, start + 0.025);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + Math.max(0.05, dur - 0.02));
    osc.connect(gain).connect(bgmMasterGain);
    osc.start(start);
    osc.stop(start + dur + 0.05);
  } catch(e) {}
}
function duckBgmForSpeech(duck) {
  if (!bgmMasterGain || !audioCtx || !state.musicOn) return;
  const now = audioCtx.currentTime;
  bgmMasterGain.gain.cancelScheduledValues(now);
  bgmMasterGain.gain.setValueAtTime(bgmMasterGain.gain.value, now);
  bgmMasterGain.gain.linearRampToValueAtTime(duck ? 0.018 : 0.055, now + 0.18);
}

function speak(text) {
  if (!('speechSynthesis' in window)) { alert('這個瀏覽器不支援朗讀功能。'); return; }
  speechSynthesis.cancel();
  duckBgmForSpeech(true);
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW';
  u.rate = 0.92;
  u.onend = () => duckBgmForSpeech(false);
  u.onerror = () => duckBgmForSpeech(false);
  speechSynthesis.speak(u);
}
function speakCurrentQuestion() {
  if (!state.currentQuestion) return;
  const subjectText = $('questionSubject').textContent.trim();
  const titleText = $('questionTitle').textContent.trim();
  const questionText = $('questionText').textContent.trim();
  const visibleOptions = [...document.querySelectorAll('#options .option-btn')]
    .filter(btn => !btn.classList.contains('hidden'))
    .map((btn, idx) => `選項${idx + 1}，${btn.textContent.trim()}`)
    .join('。');
  const inputHint = !$('answerInput').classList.contains('hidden') ? '請在空格輸入答案。' : '';
  speak(`${subjectText}。${titleText}。${questionText}。${visibleOptions}。${inputHint}`);
}

initSetup();
</script>
